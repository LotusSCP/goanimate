<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GoAnimate</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #222;
}
</style>
</head>

<body>

<div id="container"></div>

<script>
window.RufflePlayer = window.RufflePlayer || {
    config: {
        allowScriptAccess: true,
        polyfills: true
    }
};
window.addEventListener("load", () => {

    const ruffle = window.RufflePlayer.newest();

    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100vh";

    document.getElementById("container").appendChild(player);

    player.load({
        url: "https://embraceoscar.github.io/GoAnimate-Assets/animation/414827163ad4eb60/go_full.swf",

        parameters: {

            apiserver: "/",

            storePath:
            "https://embraceoscar.github.io/GoAnimate-Assets/store/3a981f5cb2739137/<store>",

            clientThemePath:
            "https://embraceoscar.github.io/GoAnimate-Assets/static/ad44370a650793d9/<client_theme>",

            isEmbed: "1",
            ctc: "go",
            ut: "30",
            bs: "default",
            appCode: "go",
            siteId: "go",
            lid: "13",
            isLogin: "Y",
            retut: "1",
            themeId: "business",
            tlang: "en_US",
            presaveId: "m-1",
            goteam_draft_only: "1",
            isWide: "1",
            nextUrl: "/html/list.html"
        }
    });

});
</script>

</body>
</html>
